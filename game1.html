<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Game</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: rgba(15, 23, 42, 0.88);
      --accent: #f59e0b;
      --accent-soft: #fbbf24;
      --player: #38bdf8;
      --computer: #fb7185;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.25), transparent 34%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }

    .game-card {
      width: min(100%, 440px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .score-box {
      text-align: center;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .score-box span {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .score-box strong {
      font-size: 1.3rem;
    }

    .score-player strong {
      color: var(--player);
    }

    .score-computer strong {
      color: var(--computer);
    }

    .score-draw strong {
      color: var(--accent-soft);
    }

    .status {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .cell:hover:enabled {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.1);
    }

    .cell.player {
      color: var(--player);
    }

    .cell.computer {
      color: var(--computer);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-primary {
      color: #111827;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
    }

    @media (max-width: 420px) {
      .game-card {
        padding: 22px;
      }

      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="game-card">
    <h1>Tic-Tac-Toe</h1>
    <p class="subtitle">You are X. The computer is O.</p>

    <section class="scoreboard" aria-label="Scoreboard">
      <div class="score-box score-player">
        <span>You</span>
        <strong id="playerScore">0</strong>
      </div>
      <div class="score-box score-draw">
        <span>Draws</span>
        <strong id="drawScore">0</strong>
      </div>
      <div class="score-box score-computer">
        <span>Computer</span>
        <strong id="computerScore">0</strong>
      </div>
    </section>

    <p class="status" id="status">Your turn. Pick a square.</p>

    <section class="board" id="board" aria-label="Game board">
      <button class="cell" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" data-index="8" aria-label="Cell 9"></button>
    </section>

    <div class="controls">
      <button class="btn btn-primary" id="restartBtn">Restart Round</button>
      <button class="btn btn-secondary" id="resetScoreBtn">Reset Score</button>
    </div>
  </main>

  <script>
    const cells = Array.from(document.querySelectorAll(".cell"));
    const statusText = document.getElementById("status");
    const playerScoreText = document.getElementById("playerScore");
    const computerScoreText = document.getElementById("computerScore");
    const drawScoreText = document.getElementById("drawScore");
    const restartBtn = document.getElementById("restartBtn");
    const resetScoreBtn = document.getElementById("resetScoreBtn");

    const winningPatterns = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    let board = Array(9).fill("");
    let isGameActive = true;
    let scores = {
      player: 0,
      computer: 0,
      draw: 0
    };

    function updateScores() {
      playerScoreText.textContent = scores.player;
      computerScoreText.textContent = scores.computer;
      drawScoreText.textContent = scores.draw;
    }

    function checkWinner(currentBoard) {
      for (const pattern of winningPatterns) {
        const [a, b, c] = pattern;
        if (
          currentBoard[a] &&
          currentBoard[a] === currentBoard[b] &&
          currentBoard[a] === currentBoard[c]
        ) {
          return currentBoard[a];
        }
      }

      return currentBoard.includes("") ? null : "draw";
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function endRound(result) {
      isGameActive = false;

      if (result === "X") {
        scores.player += 1;
        setStatus("You win this round!");
      } else if (result === "O") {
        scores.computer += 1;
        setStatus("Computer wins this round.");
      } else {
        scores.draw += 1;
        setStatus("It's a draw.");
      }

      updateScores();
    }

    function drawBoard() {
      cells.forEach((cell, index) => {
        const value = board[index];
        cell.textContent = value;
        cell.disabled = !isGameActive || value !== "";
        cell.classList.toggle("player", value === "X");
        cell.classList.toggle("computer", value === "O");
      });
    }

    function getBestMove() {
      const openIndexes = board
        .map((value, index) => (value === "" ? index : null))
        .filter((value) => value !== null);

      for (const index of openIndexes) {
        const testBoard = [...board];
        testBoard[index] = "O";
        if (checkWinner(testBoard) === "O") {
          return index;
        }
      }

      for (const index of openIndexes) {
        const testBoard = [...board];
        testBoard[index] = "X";
        if (checkWinner(testBoard) === "X") {
          return index;
        }
      }

      if (board[4] === "") {
        return 4;
      }

      const corners = [0, 2, 6, 8].filter((index) => board[index] === "");
      if (corners.length) {
        return corners[Math.floor(Math.random() * corners.length)];
      }

      return openIndexes[Math.floor(Math.random() * openIndexes.length)];
    }

    function computerTurn() {
      if (!isGameActive) {
        return;
      }

      setStatus("Computer is thinking...");

      window.setTimeout(() => {
        const move = getBestMove();
        board[move] = "O";
        drawBoard();

        const result = checkWinner(board);
        if (result) {
          endRound(result);
          drawBoard();
          return;
        }

        setStatus("Your turn. Pick a square.");
      }, 450);
    }

    function handlePlayerMove(event) {
      const index = Number(event.currentTarget.dataset.index);

      if (!isGameActive || board[index] !== "") {
        return;
      }

      board[index] = "X";
      drawBoard();

      const result = checkWinner(board);
      if (result) {
        endRound(result);
        drawBoard();
        return;
      }

      computerTurn();
    }

    function restartRound() {
      board = Array(9).fill("");
      isGameActive = true;
      setStatus("Your turn. Pick a square.");
      drawBoard();
    }

    function resetScore() {
      scores = {
        player: 0,
        computer: 0,
        draw: 0
      };
      updateScores();
      restartRound();
    }

    cells.forEach((cell) => cell.addEventListener("click", handlePlayerMove));
    restartBtn.addEventListener("click", restartRound);
    resetScoreBtn.addEventListener("click", resetScore);

    drawBoard();
    updateScores();
</script>
</body>
</html>
